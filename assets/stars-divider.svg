<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40">
  <style>
    .star { fill: #ff003c; }
    .star-dim { fill: #3b0a0a; }
    .twinkle1 { animation: twinkle 3s ease-in-out infinite; }
    .twinkle2 { animation: twinkle 2.5s ease-in-out infinite 0.5s; }
    .twinkle3 { animation: twinkle 4s ease-in-out infinite 1s; }
    .twinkle4 { animation: twinkle 3.5s ease-in-out infinite 1.5s; }
    .twinkle5 { animation: twinkle 2s ease-in-out infinite 0.8s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .line { stroke: #1a0a0a; stroke-width: 0.5; }
  </style>
  <line class="line" x1="0" y1="20" x2="800" y2="20" />
  <circle class="star twinkle1" cx="50" cy="20" r="1.5" />
  <circle class="star twinkle2" cx="120" cy="15" r="1" />
  <circle class="star-dim twinkle3" cx="180" cy="25" r="1.2" />
  <circle class="star twinkle4" cx="250" cy="18" r="0.8" />
  <circle class="star twinkle5" cx="320" cy="22" r="1.5" />
  <circle class="star-dim twinkle1" cx="370" cy="12" r="1" />
  <circle class="star twinkle3" cx="400" cy="20" r="2" />
  <circle class="star-dim twinkle2" cx="430" cy="28" r="1" />
  <circle class="star twinkle4" cx="480" cy="16" r="1.5" />
  <circle class="star twinkle5" cx="550" cy="24" r="0.8" />
  <circle class="star-dim twinkle1" cx="620" cy="19" r="1.2" />
  <circle class="star twinkle2" cx="680" cy="14" r="1" />
  <circle class="star twinkle3" cx="750" cy="22" r="1.5" />
</svg>
