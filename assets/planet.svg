<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <style>
    .planet-body { fill: #ff003c; }
    .planet-shadow { fill: #8a0020; }
    .ring { fill: none; stroke: #ff003c; stroke-width: 1.2; opacity: 0.6; }
    .orbit { animation: spin 8s linear infinite; transform-origin: 30px 30px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .glow { fill: #ff003c; opacity: 0.15; }
  </style>
  <circle class="glow" cx="30" cy="30" r="22" />
  <circle class="planet-body" cx="30" cy="30" r="10" />
  <circle class="planet-shadow" cx="33" cy="28" r="10" />
  <clipPath id="planetClip"><circle cx="30" cy="30" r="10" /></clipPath>
  <circle cx="33" cy="28" r="10" fill="#8a0020" clip-path="url(#planetClip)" />
  <g class="orbit">
    <ellipse class="ring" cx="30" cy="30" rx="20" ry="6" transform="rotate(-20 30 30)" />
    <circle cx="50" cy="27" r="2" fill="#ff003c" opacity="0.8" />
  </g>
</svg>
