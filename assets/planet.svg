<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <style>
    .orbit1 { animation: spin 8s linear infinite; transform-origin: 100px 100px; }
    .orbit2 { animation: spin-reverse 12s linear infinite; transform-origin: 100px 100px; }
    
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-reverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    
    .glow { fill: #ff003c; opacity: 0.15; }
  </style>

  <!-- Ambient Glow -->
  <circle class="glow" cx="100" cy="100" r="50" />
  <circle class="glow" cx="100" cy="100" r="35" opacity="0.3" />

  <!-- Main Planet Body -->
  <circle cx="100" cy="100" r="22" fill="#8a0020" />
  
  <!-- Planet Crescent Highlight (Simulates 3D Sphere left-lit) -->
  <path d="M 100 78 A 22 22 0 0 0 78 100 A 22 22 0 0 0 100 122 A 16 22 0 0 1 100 78 Z" fill="#ff003c" />
  
  <!-- Planet Shadow (Right side) -->
  <path d="M 100 78 A 22 22 0 0 1 122 100 A 22 22 0 0 1 100 122 A 28 22 0 0 0 100 78 Z" fill="#2a000a" opacity="0.7" />

  <!-- Inner Orbit (Tilted) -->
  <g class="orbit1">
    <ellipse cx="100" cy="100" rx="45" ry="12" fill="none" stroke="#ff003c" stroke-width="1.2" opacity="0.5" transform="rotate(-15 100 100)" />
    <!-- Inner Moon -->
    <g transform="rotate(-15 100 100)">
      <circle cx="145" cy="100" r="3.5" fill="#ff003c" />
      <circle cx="146" cy="99" r="1.5" fill="#ffffff" opacity="0.7" />
    </g>
  </g>

  <!-- Outer Orbit (Tilted other way) -->
  <g class="orbit2">
    <ellipse cx="100" cy="100" rx="65" ry="16" fill="none" stroke="#ff003c" stroke-width="1" opacity="0.3" transform="rotate(25 100 100)" stroke-dasharray="2 3"/>
    <!-- Outer Moon -->
    <g transform="rotate(25 100 100)">
      <circle cx="35" cy="100" r="5" fill="#8a0020" />
      <!-- Moon crescent -->
      <path d="M 35 95 A 5 5 0 0 0 30 100 A 5 5 0 0 0 35 105 A 3.5 5 0 0 1 35 95 Z" fill="#ff003c" />
    </g>
  </g>

</svg>
